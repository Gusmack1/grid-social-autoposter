<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Social — Social Media Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root{--bg:#0a0c10;--surface:#12151c;--surface2:#1a1e28;--border:#252a36;--text:#e5e7eb;--muted:#6b7280;--accent:#3b82f6;--accent2:#2563eb;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Instrument Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
input,textarea,select,button{font-family:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.animate-in{animation:fadeIn .3s ease both}
.pulse{animation:pulse 1.5s ease-in-out infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;
const DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];

// ─── Phone Preview Component ───
function PhonePreview({caption,imageUrl,platform,clientName}){
  const isFb = platform==="facebook";
  return(
    <div style={{width:280,margin:"0 auto"}}>
      <div style={{background:"#000",borderRadius:28,padding:8,boxShadow:"0 20px 60px rgba(0,0,0,0.5)"}}>
        <div style={{background:isFb?"#fff":"#000",borderRadius:22,overflow:"hidden",minHeight:420}}>
          {/* Header */}
          <div style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:10,background:isFb?"#fff":"#000",borderBottom:isFb?"1px solid #eee":"1px solid #222"}}>
            <div style={{width:32,height:32,borderRadius:"50%",background:isFb?"#1877F2":"linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:700}}>{clientName?.charAt(0)||"?"}</div>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:isFb?"#1c1e21":"#fff"}}>{clientName||"Business"}</div>
              <div style={{fontSize:10,color:isFb?"#65676B":"#8e8e8e"}}>{isFb?"Just now · 🌐":"Sponsored"}</div>
            </div>
          </div>
          {/* Caption */}
          {isFb && <div style={{padding:"8px 14px",fontSize:13,lineHeight:1.5,color:"#1c1e21",maxHeight:120,overflow:"hidden",whiteSpace:"pre-wrap"}}>{caption||"Your caption here..."}</div>}
          {/* Image */}
          {imageUrl ? <div style={{width:"100%",aspectRatio:"1",background:"#1a1a2e",overflow:"hidden"}}>
            <img src={imageUrl} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none"}} />
          </div> : <div style={{width:"100%",aspectRatio:"1",background:isFb?"#f0f2f5":"#1a1a2e",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:40,opacity:.3}}>📷</span>
          </div>}
          {/* IG caption below image */}
          {!isFb && <div style={{padding:"10px 14px"}}>
            <div style={{display:"flex",gap:16,marginBottom:8}}>
              <span style={{fontSize:20}}>♡</span><span style={{fontSize:20}}>💬</span><span style={{fontSize:20}}>✈</span>
            </div>
            <div style={{fontSize:12,lineHeight:1.5,color:"#fff",maxHeight:80,overflow:"hidden"}}><strong>{clientName} </strong>{caption||"Your caption here..."}</div>
          </div>}
          {/* FB reactions */}
          {isFb && <div style={{padding:"8px 14px",borderTop:"1px solid #eee",display:"flex",justifyContent:"space-around"}}>
            <span style={{fontSize:12,color:"#65676B"}}>👍 Like</span><span style={{fontSize:12,color:"#65676B"}}>💬 Comment</span><span style={{fontSize:12,color:"#65676B"}}>↗ Share</span>
          </div>}
        </div>
      </div>
    </div>
  );
}

// ─── API Health Component ───
function ApiHealth({client}){
  const [health,setHealth]=useState(null);
  const [checking,setChecking]=useState(false);

  const checkHealth=async()=>{
    if(!client?.pageAccessToken)return setHealth({status:"no_token"});
    setChecking(true);
    try{
      const r=await fetch(`https://graph.facebook.com/v21.0/me?access_token=${client.pageAccessToken}`);
      const d=await r.json();
      if(d.error){setHealth({status:"error",message:d.error.message,code:d.error.code})}
      else{
        const info={status:"ok",name:d.name,id:d.id,fb:!!client.fbPageId,ig:!!client.igUserId};
        // Check token expiry if possible
        try{
          const dr=await fetch(`https://graph.facebook.com/v21.0/debug_token?input_token=${client.pageAccessToken}&access_token=${client.pageAccessToken}`);
          const dd=await dr.json();
          if(dd.data){
            info.expiresAt=dd.data.expires_at?new Date(dd.data.expires_at*1000).toLocaleDateString("en-GB"):null;
            info.isValid=dd.data.is_valid;
            info.scopes=dd.data.scopes||[];
          }
        }catch(e){}
        setHealth(info);
      }
    }catch(e){setHealth({status:"error",message:e.message})}
    setChecking(false);
  };

  useEffect(()=>{if(client)checkHealth()},[client?.id,client?.pageAccessToken]);

  if(!client)return null;
  if(!health)return <div style={{fontSize:12,color:"var(--muted)"}}>Checking API...</div>;

  const items=[];
  if(health.status==="no_token") items.push({label:"API Token",ok:false,text:"Not configured"});
  else if(health.status==="error") items.push({label:"API Token",ok:false,text:health.message?.substring(0,60)});
  else{
    items.push({label:"API Token",ok:true,text:health.name||"Valid"});
    items.push({label:"Facebook Page",ok:!!client.fbPageId,text:client.fbPageId||"Not linked"});
    items.push({label:"Instagram",ok:!!client.igUserId,text:client.igUserId||"Not linked"});
    if(health.expiresAt) items.push({label:"Token Expires",ok:true,warn:true,text:health.expiresAt==="Invalid Date"?"Never (permanent)":health.expiresAt});
    else items.push({label:"Token Expires",ok:true,text:"Permanent ✓"});
    if(health.scopes?.length>0){
      const required=["pages_manage_posts","pages_read_engagement","instagram_basic","instagram_content_publish"];
      const missing=required.filter(s=>!health.scopes.includes(s));
      if(missing.length>0) items.push({label:"Permissions",ok:false,text:`Missing: ${missing.join(", ")}`});
      else items.push({label:"Permissions",ok:true,text:`${health.scopes.length} scopes active`});
    }
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {items.map((item,i)=>
        <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0"}}>
          <span style={{fontSize:12,color:"var(--muted)"}}>{item.label}</span>
          <span style={{fontSize:12,padding:"2px 10px",borderRadius:4,
            background:item.ok?"rgba(34,197,94,0.12)":item.warn?"rgba(245,158,11,0.12)":"rgba(239,68,68,0.12)",
            color:item.ok?"var(--green)":item.warn?"var(--amber)":"var(--red)"}}>{item.text}</span>
        </div>
      )}
      <button onClick={checkHealth} disabled={checking}
        style={{marginTop:4,padding:"6px 12px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,color:"var(--muted)",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
        {checking?"Checking...":"↻ Refresh Status"}
      </button>
    </div>
  );
}

// ─── Bulk Import Modal ───
function BulkImportModal({onImport,onClose,S}){
  const [raw,setRaw]=useState("");
  const [parsed,setParsed]=useState([]);
  const [sep,setSep]=useState("---");

  const parse=()=>{
    const chunks=raw.split(sep).map(c=>c.trim()).filter(Boolean);
    setParsed(chunks.map(c=>{
      const imgMatch=c.match(/https?:\/\/\S+\.(jpg|jpeg|png|gif|webp)\S*/i);
      const caption=imgMatch?c.replace(imgMatch[0],"").trim():c;
      return{caption,imageUrl:imgMatch?imgMatch[0]:""};
    }));
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={onClose}>
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:16,padding:28,width:600,maxHeight:"85vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
        <h3 style={{fontSize:18,fontWeight:700,color:"#fff",marginBottom:8}}>Bulk Import Posts</h3>
        <p style={{fontSize:12,color:"var(--muted)",marginBottom:16}}>Paste multiple posts separated by a delimiter. Image URLs are auto-detected.</p>
        <div style={{marginBottom:12}}>
          <div style={S.label}>Separator</div>
          <div style={{display:"flex",gap:6}}>
            {["---","===","###","blank line"].map(s=>
              <button key={s} onClick={()=>setSep(s==="blank line"?"\n\n":s)}
                style={{padding:"4px 12px",background:sep===(s==="blank line"?"\n\n":s)?"var(--accent)":"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,color:sep===(s==="blank line"?"\n\n":s)?"#fff":"var(--muted)",fontSize:11,cursor:"pointer"}}>{s}</button>
            )}
          </div>
        </div>
        <textarea value={raw} onChange={e=>setRaw(e.target.value)} placeholder={"First post caption here\nhttps://example.com/photo1.jpg\n---\nSecond post caption\nhttps://example.com/photo2.jpg\n---\nThird post (text only)"}
          style={{...S.input,minHeight:200,resize:"vertical",fontSize:13,lineHeight:1.6}} />
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button onClick={parse} style={S.btn(false)}>Preview ({raw.split(sep).filter(c=>c.trim()).length} posts)</button>
        </div>
        {parsed.length>0&&<div style={{marginTop:16,borderTop:"1px solid var(--border)",paddingTop:12}}>
          <div style={{fontSize:12,color:"var(--muted)",marginBottom:8}}>{parsed.length} posts detected:</div>
          {parsed.map((p,i)=>
            <div key={i} style={{padding:8,background:"var(--surface2)",borderRadius:6,marginBottom:6,fontSize:12}}>
              <div style={{color:"#fff",marginBottom:4}}>#{i+1}: {p.caption.substring(0,80)}...</div>
              {p.imageUrl&&<div style={{color:"var(--accent)",fontSize:11}}>📷 {p.imageUrl.substring(0,60)}...</div>}
            </div>
          )}
          <button onClick={()=>{onImport(parsed);onClose()}} style={{...S.btn(true),marginTop:8,width:"100%"}}>Import {parsed.length} Posts to Queue</button>
        </div>}
        <button onClick={onClose} style={{...S.btn(false),marginTop:8}}>Cancel</button>
      </div>
    </div>
  );
}

// ─── Main App ───
function App(){
  const [key,setKey]=useState(localStorage.getItem("gsa_key")||"");
  const [authed,setAuthed]=useState(false);
  const [authErr,setAuthErr]=useState("");
  const [keyInput,setKeyInput]=useState("");
  const [clients,setClients]=useState([]);
  const [activeClient,setActiveClient]=useState(null);
  const [posts,setPosts]=useState([]);
  const [view,setView]=useState("compose");
  const [calMonth,setCalMonth]=useState(new Date().getMonth());
  const [calYear,setCalYear]=useState(new Date().getFullYear());
  const [toast,setToast]=useState(null);
  const [showModal,setShowModal]=useState(false);
  const [showBulk,setShowBulk]=useState(false);
  const [editClient,setEditClient]=useState(null);
  const [compose,setCompose]=useState({caption:"",imageUrl:"",fb:true,ig:true,scheduledFor:""});
  const [previewPlatform,setPreviewPlatform]=useState("facebook");
  const [publishing,setPublishing]=useState(null);

  const showToast=(msg,err)=>{setToast({msg,err});setTimeout(()=>setToast(null),3000)};

  const api=useCallback(async(action,method,body,cid)=>{
    method=method||"GET";
    let url="/api/admin?action="+action;
    if(cid)url+="&clientId="+cid;
    const opts={method,headers:{Authorization:"Bearer "+key}};
    if(body){opts.headers["Content-Type"]="application/json";opts.body=JSON.stringify(body)}
    try{
      const r=await fetch(url,opts);
      if(r.status===401){setAuthed(false);localStorage.removeItem("gsa_key");return null}
      return await r.json();
    }catch(e){showToast(e.message,true);return null}
  },[key]);

  const loadClients=useCallback(async()=>{
    const d=await api("get-clients");
    if(d){setClients(d);if(d.length>0&&!activeClient)setActiveClient(d[0])}
  },[api]);

  const loadPosts=useCallback(async()=>{
    if(!activeClient)return;
    const d=await api("get-posts","GET",null,activeClient.id);
    if(d)setPosts(d);
  },[api,activeClient]);

  useEffect(()=>{if(authed)loadClients()},[authed]);
  useEffect(()=>{if(authed&&activeClient)loadPosts()},[authed,activeClient]);

  useEffect(()=>{
    if(key){
      fetch("/api/admin?action=config",{headers:{Authorization:"Bearer "+key}})
        .then(r=>{if(r.ok)setAuthed(true);else{localStorage.removeItem("gsa_key");setKey("")}})
        .catch(()=>{})
    }
  },[]);

  const doLogin=async()=>{
    if(!keyInput.trim())return;
    try{
      const r=await fetch("/api/admin?action=config",{headers:{Authorization:"Bearer "+keyInput.trim()}});
      if(r.ok){setKey(keyInput.trim());localStorage.setItem("gsa_key",keyInput.trim());setAuthed(true);setAuthErr("")}
      else setAuthErr("Invalid admin key")
    }catch(e){setAuthErr("Connection failed")}
  };

  const addPost=async()=>{
    if(!compose.caption.trim())return showToast("Write a caption first",true);
    if(!activeClient)return showToast("Select a client first",true);
    const pl=[];if(compose.fb)pl.push("facebook");if(compose.ig)pl.push("instagram");
    if(!pl.length)return showToast("Select a platform",true);
    const res=await api("add-post","POST",{caption:compose.caption,imageUrl:compose.imageUrl||null,platforms:pl,scheduledFor:compose.scheduledFor||null},activeClient.id);
    if(res&&res.success){showToast(compose.scheduledFor?"Scheduled!":"Added to queue!");setCompose({caption:"",imageUrl:"",fb:true,ig:true,scheduledFor:""});loadPosts()}
  };

  const bulkImport=async(items)=>{
    let count=0;
    for(const item of items){
      const pl=["facebook"];if(item.imageUrl)pl.push("instagram");
      const res=await api("add-post","POST",{caption:item.caption,imageUrl:item.imageUrl||null,platforms:pl},activeClient.id);
      if(res?.success)count++;
    }
    showToast(`Imported ${count}/${items.length} posts`);
    loadPosts();
  };

  const deletePost=async(pid)=>{if(!confirm("Delete?"))return;await api("delete-post","DELETE",{postId:pid},activeClient.id);loadPosts();showToast("Deleted")};

  const publishPost=async(pid)=>{
    if(!confirm("Publish now?"))return;
    setPublishing(pid);
    showToast("Publishing...");
    const r=await api("publish-now","POST",{postId:pid},activeClient.id);
    setPublishing(null);
    if(r&&r.success){
      const msgs=[];
      if(r.results?.facebook?.success)msgs.push("FB ✓");
      if(r.results?.facebook&&!r.results.facebook.success)msgs.push("FB ✗");
      if(r.results?.instagram?.success)msgs.push("IG ✓");
      if(r.results?.instagram&&!r.results.instagram.success)msgs.push("IG ✗");
      showToast("Published! "+msgs.join(" · "));
      loadPosts();
    }else showToast(r?.error||"Failed",true);
  };

  const saveClient=async(data)=>{
    if(editClient&&editClient.id){await api("update-client","PUT",{...data,id:editClient.id})}
    else{await api("add-client","POST",data)}
    loadClients();setShowModal(false);setEditClient(null);showToast("Client saved");
  };

  const deleteClient=async(id)=>{
    if(!confirm("Delete this client and all their posts?"))return;
    await api("delete-client","DELETE",{id});
    loadClients();setActiveClient(null);showToast("Client deleted");
  };

  const calDays=()=>{const f=new Date(calYear,calMonth,1);const l=new Date(calYear,calMonth+1,0);const s=(f.getDay()+6)%7;const d=[];for(let i=0;i<s;i++)d.push(null);for(let i=1;i<=l.getDate();i++)d.push(i);return d};
  const getDayPosts=(day)=>{const ds=new Date(calYear,calMonth,day).toISOString().split("T")[0];return posts.filter(p=>{const pd=p.scheduledFor?p.scheduledFor.split("T")[0]:p.createdAt?.split("T")[0];return pd===ds})};

  const queued=posts.filter(p=>p.status==="queued"||p.status==="scheduled");
  const published=posts.filter(p=>p.status==="published");
  const charCount=compose.caption.length;

  const S={
    sidebar:{width:256,background:"#0e1018",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",flexShrink:0,height:"100vh",position:"sticky",top:0},
    navBtn:(active)=>({width:"100%",padding:"10px 14px",background:active?"var(--surface2)":"transparent",border:active?"1px solid var(--border)":"1px solid transparent",borderRadius:8,color:active?"#fff":"var(--muted)",fontSize:13,fontWeight:active?600:400,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10,marginBottom:2,fontFamily:"inherit"}),
    card:{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:20,animation:"fadeIn .3s ease both"},
    input:{width:"100%",padding:"10px 12px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:8,color:"#fff",fontSize:13,outline:"none",fontFamily:"inherit"},
    label:{fontSize:10,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:6},
    badge:(ok,warn)=>({fontSize:11,padding:"3px 8px",borderRadius:4,background:ok?"rgba(34,197,94,0.15)":warn?"rgba(245,158,11,0.15)":"rgba(239,68,68,0.15)",color:ok?"var(--green)":warn?"var(--amber)":"var(--red)"}),
    btn:(primary)=>({padding:"10px 20px",background:primary?"var(--accent)":"transparent",color:primary?"#fff":"var(--muted)",border:primary?"none":"1px solid var(--border)",borderRadius:8,fontSize:13,fontWeight:primary?700:400,cursor:"pointer",fontFamily:"inherit",transition:"all .15s ease"}),
    btnSm:(color)=>({padding:"6px 12px",background:color==="green"?"rgba(34,197,94,0.12)":color==="red"?"rgba(239,68,68,0.1)":"var(--surface2)",color:color==="green"?"var(--green)":color==="red"?"var(--red)":"var(--muted)",border:"none",borderRadius:6,fontSize:12,cursor:"pointer",fontWeight:600,fontFamily:"inherit"})
  };

  // ─── LOGIN ───
  if(!authed)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
      <div style={{textAlign:"center",animation:"fadeIn .5s ease both"}}>
        <div style={{fontSize:36,fontWeight:800,color:"#fff",marginBottom:4,letterSpacing:"-0.5px"}}>Grid<span style={{color:"var(--accent)"}}>Social</span></div>
        <p style={{color:"var(--muted)",fontSize:13,marginBottom:32}}>Social Media Management Platform</p>
        <input type="password" placeholder="Enter admin key" value={keyInput} onChange={e=>setKeyInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} autoFocus
          style={{...S.input,width:340,marginBottom:12,display:"block",padding:"14px 16px",fontSize:14}} />
        {authErr&&<p style={{color:"var(--red)",fontSize:12,marginBottom:8}}>{authErr}</p>}
        <button onClick={doLogin} style={{...S.btn(true),width:340,padding:14,fontSize:14}}>Sign in</button>
      </div>
    </div>
  );

  return(
    <div style={{display:"flex",minHeight:"100vh",background:"var(--bg)"}}>
      {/* SIDEBAR */}
      <div style={S.sidebar}>
        <div style={{padding:"20px 16px 14px",borderBottom:"1px solid var(--border)"}}>
          <div style={{fontSize:20,fontWeight:800,color:"#fff",letterSpacing:"-0.3px"}}>Grid<span style={{color:"var(--accent)"}}>Social</span></div>
          <p style={{fontSize:11,color:"var(--muted)",marginTop:2}}>Social Media Manager</p>
        </div>
        <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={S.label}>Client</div><button onClick={()=>{setEditClient(null);setShowModal(true)}} style={{background:"var(--accent)",color:"#fff",border:"none",borderRadius:5,width:20,height:20,fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1,padding:0}} title="Add new client">+</button></div>
          <select value={activeClient?.id||""} onChange={e=>{const c=clients.find(x=>x.id===e.target.value);setActiveClient(c)}}
            style={{...S.input,cursor:"pointer"}}>
            {clients.length===0&&<option>No clients</option>}
            {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          {activeClient&&<div style={{display:"flex",gap:4,marginTop:6}}>
            <span style={{...S.badge(!!activeClient.pageAccessToken),fontSize:9}}>{activeClient.pageAccessToken?"● Token":"○ Token"}</span>
            <span style={{...S.badge(!!activeClient.fbPageId,!activeClient.fbPageId),fontSize:9}}>{activeClient.fbPageId?"● FB":"○ FB"}</span>
            <span style={{...S.badge(!!activeClient.igUserId,!activeClient.igUserId),fontSize:9}}>{activeClient.igUserId?"● IG":"○ IG"}</span>
          </div>}
        </div>
        <div style={{padding:"8px",flex:1}}>
          {[{id:"compose",icon:"✏️",label:"Create Post"},{id:"queue",icon:"📋",label:"Queue"},{id:"calendar",icon:"📅",label:"Calendar"},{id:"published",icon:"✅",label:"Published"},{id:"health",icon:"🩺",label:"API Health"},{id:"clients",icon:"⚙️",label:"Clients & API"}].map(item=>
            <button key={item.id} onClick={()=>setView(item.id)} style={S.navBtn(view===item.id)}>
              <span style={{fontSize:16}}>{item.icon}</span>{item.label}
              {item.id==="queue"&&queued.length>0&&<span style={{marginLeft:"auto",background:"var(--accent)",color:"#fff",fontSize:10,padding:"1px 7px",borderRadius:10,fontWeight:700}}>{queued.length}</span>}
              {item.id==="published"&&published.length>0&&<span style={{marginLeft:"auto",fontSize:10,color:"var(--muted)"}}>{published.length}</span>}
            </button>
          )}
        </div>
        <div style={{padding:"12px 16px",borderTop:"1px solid var(--border)"}}>
          <div style={{fontSize:10,color:"#374151"}}>Grid Social v2.1</div>
          <div style={{fontSize:10,color:"#262a30",marginTop:2}}>Schedule: Mon/Wed/Fri 10am</div>
        </div>
      </div>

      {/* MAIN */}
      <div style={{flex:1,overflow:"auto"}}>
        <div style={{maxWidth:1040,margin:"0 auto",padding:"28px 36px"}}>

          {/* ─── CREATE POST ─── */}
          {view==="compose"&&<div className="animate-in">
            <h2 style={{fontSize:22,fontWeight:700,color:"#fff",marginBottom:20}}>Create Post</h2>
            {!activeClient?<div style={{...S.card,padding:48,textAlign:"center",color:"var(--muted)"}}>
              <p style={{fontSize:15,marginBottom:12}}>Add a client first</p>
              <button onClick={()=>{setView("clients");setShowModal(true)}} style={S.btn(true)}>Add Client</button>
            </div>:<div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:20}}>
              <div>
                {/* Compose Card */}
                <div style={S.card}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
                    <div style={{width:40,height:40,borderRadius:"50%",background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:"#fff"}}>{activeClient.name.charAt(0)}</div>
                    <div><div style={{fontWeight:600,fontSize:14,color:"#fff"}}>{activeClient.name}</div>
                    <div style={{fontSize:11,color:"var(--muted)"}}>{compose.fb&&compose.ig?"Facebook + Instagram":compose.fb?"Facebook":compose.ig?"Instagram":"None"}</div></div>
                    <div style={{marginLeft:"auto",fontSize:12,color:charCount>2200?"var(--red)":charCount>1800?"var(--amber)":"var(--muted)"}}>{charCount}/2,200</div>
                  </div>
                  <textarea value={compose.caption} onChange={e=>setCompose(p=>({...p,caption:e.target.value}))}
                    placeholder="Write your post here..."
                    style={{width:"100%",minHeight:200,background:"transparent",border:"none",color:"var(--text)",fontSize:15,lineHeight:1.7,resize:"vertical",outline:"none",fontFamily:"inherit"}} />
                  <div style={{borderTop:"1px solid var(--border)",paddingTop:14,marginTop:14}}>
                    <div style={S.label}>Image URL</div>
                    <input type="url" value={compose.imageUrl} onChange={e=>setCompose(p=>({...p,imageUrl:e.target.value}))}
                      placeholder="https://grid-social-autoposter.netlify.app/photos/example.jpg" style={S.input} />
                  </div>
                  {compose.imageUrl&&<div style={{marginTop:12}}><img src={compose.imageUrl} style={{maxWidth:"100%",maxHeight:180,borderRadius:8,objectFit:"cover"}} onError={e=>{e.target.style.display="none"}} /></div>}
                </div>

                {/* Phone Preview */}
                {compose.caption&&<div style={{marginTop:16}}>
                  <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:14}}>
                    <button onClick={()=>setPreviewPlatform("facebook")} style={{...S.btnSm(previewPlatform==="facebook"?"green":null),background:previewPlatform==="facebook"?"rgba(59,130,246,0.15)":"var(--surface2)",color:previewPlatform==="facebook"?"var(--accent)":"var(--muted)"}}>📘 Facebook</button>
                    <button onClick={()=>setPreviewPlatform("instagram")} style={{...S.btnSm(previewPlatform==="instagram"?"green":null),background:previewPlatform==="instagram"?"rgba(236,73,153,0.15)":"var(--surface2)",color:previewPlatform==="instagram"?"#ec4899":"var(--muted)"}}>📸 Instagram</button>
                  </div>
                  <PhonePreview caption={compose.caption} imageUrl={compose.imageUrl} platform={previewPlatform} clientName={activeClient.name} />
                </div>}
              </div>

              {/* Right sidebar */}
              <div>
                <div style={{...S.card,padding:16,marginBottom:12}}>
                  <div style={S.label}>Platforms</div>
                  {[{k:"fb",l:"Facebook",i:"📘",on:!!activeClient.fbPageId},{k:"ig",l:"Instagram",i:"📸",on:!!activeClient.igUserId}].map(p=>
                    <label key={p.k} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",cursor:"pointer"}}>
                      <input type="checkbox" checked={compose[p.k]} onChange={e=>setCompose(x=>({...x,[p.k]:e.target.checked}))} style={{width:18,height:18,accentColor:"var(--accent)"}} />
                      <span>{p.i}</span><span style={{fontSize:13}}>{p.l}</span>
                      {!p.on&&<span style={{marginLeft:"auto",...S.badge(false,true)}}>Not linked</span>}
                    </label>
                  )}
                  {compose.ig&&!compose.imageUrl&&<div style={{fontSize:11,color:"var(--amber)",padding:"6px 8px",background:"rgba(245,158,11,0.08)",borderRadius:6,marginTop:4}}>⚠ Instagram requires an image</div>}
                </div>
                <div style={{...S.card,padding:16,marginBottom:12}}>
                  <div style={S.label}>Schedule</div>
                  <input type="datetime-local" value={compose.scheduledFor} onChange={e=>setCompose(p=>({...p,scheduledFor:e.target.value}))}
                    style={{...S.input,colorScheme:"dark"}} />
                  <p style={{fontSize:11,color:"var(--muted)",marginTop:6}}>Leave empty to add to queue</p>
                </div>
                <button onClick={addPost} style={{...S.btn(true),width:"100%",padding:14,marginBottom:8,fontSize:14}}>{compose.scheduledFor?"📅 Schedule Post":"➕ Add to Queue"}</button>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>setShowBulk(true)} style={{...S.btn(false),flex:1,fontSize:12,padding:"8px 12px"}}>📦 Bulk Import</button>
                  <button onClick={()=>setCompose({caption:"",imageUrl:"",fb:true,ig:true,scheduledFor:""})} style={{...S.btn(false),fontSize:12,padding:"8px 12px"}}>Clear</button>
                </div>
              </div>
            </div>}
          </div>}

          {/* ─── QUEUE ─── */}
          {view==="queue"&&<div className="animate-in">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h2 style={{fontSize:22,fontWeight:700,color:"#fff"}}>Post Queue</h2>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:13,color:"var(--muted)"}}>{queued.length} queued</span>
                {queued.length>0&&<button onClick={()=>publishPost(queued[0].id)} style={S.btnSm("green")}>▶ Publish Next</button>}
              </div>
            </div>
            {queued.length===0?<div style={{...S.card,padding:48,textAlign:"center",color:"var(--muted)"}}><p style={{fontSize:28,marginBottom:8}}>📝</p><p>Queue is empty — create a post to get started</p></div>
            :queued.map((p,i)=>
              <div key={p.id} style={{...S.card,marginBottom:8,display:"flex",gap:14,padding:16,animationDelay:`${i*50}ms`,opacity:publishing===p.id?.5:1,transition:"opacity .3s"}}>
                <div style={{width:36,height:36,borderRadius:8,background:"var(--surface2)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--muted)",fontSize:13,fontWeight:700,flexShrink:0}}>{i+1}</div>
                {p.imageUrl&&<div style={{width:52,height:52,borderRadius:8,overflow:"hidden",flexShrink:0}}><img src={p.imageUrl} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.parentElement.style.display="none"}} /></div>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,lineHeight:1.5,whiteSpace:"pre-wrap",maxHeight:80,overflow:"hidden"}}>{p.caption}</div>
                  <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                    {p.platforms.map(pl=><span key={pl} style={{fontSize:11,padding:"2px 8px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:4,color:"var(--muted)"}}>{pl}</span>)}
                    {p.imageUrl&&<span style={{fontSize:11,padding:"2px 8px",background:"var(--surface2)",borderRadius:4,color:"var(--muted)"}}>📷</span>}
                    {p.scheduledFor&&<span style={{fontSize:11,padding:"2px 8px",background:"rgba(59,130,246,0.12)",borderRadius:4,color:"var(--accent)"}}>📅 {new Date(p.scheduledFor).toLocaleDateString("en-GB",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:4,flexShrink:0,alignItems:"flex-start"}}>
                  <button onClick={()=>publishPost(p.id)} disabled={publishing===p.id} style={S.btnSm("green")}>{publishing===p.id?"...":"Publish"}</button>
                  <button onClick={()=>deletePost(p.id)} style={S.btnSm("red")}>×</button>
                </div>
              </div>
            )}
          </div>}

          {/* ─── CALENDAR ─── */}
          {view==="calendar"&&<div className="animate-in">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h2 style={{fontSize:22,fontWeight:700,color:"#fff"}}>Content Calendar</h2>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button onClick={()=>{if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1)}else setCalMonth(m=>m-1)}} style={{padding:"6px 12px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,color:"var(--muted)",cursor:"pointer",fontSize:16}}>‹</button>
                <span style={{fontSize:15,fontWeight:600,color:"#fff",minWidth:160,textAlign:"center"}}>{MONTHS[calMonth]} {calYear}</span>
                <button onClick={()=>{if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1)}else setCalMonth(m=>m+1)}} style={{padding:"6px 12px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,color:"var(--muted)",cursor:"pointer",fontSize:16}}>›</button>
              </div>
            </div>
            {/* Schedule indicator */}
            <div style={{display:"flex",gap:12,marginBottom:16,fontSize:11,color:"var(--muted)"}}>
              <span>🟢 Published</span><span>🔵 Queued</span><span>⬜ Auto-post days: Mon / Wed / Fri at 10am</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:"var(--border)",borderRadius:12,overflow:"hidden"}}>
              {DAYS.map(d=><div key={d} style={{padding:10,textAlign:"center",fontSize:10,fontWeight:600,color:"var(--muted)",background:"var(--surface)",textTransform:"uppercase",letterSpacing:1}}>{d}</div>)}
              {calDays().map((day,i)=>{
                const dp=day?getDayPosts(day):[];
                const today=day&&new Date().getDate()===day&&new Date().getMonth()===calMonth&&new Date().getFullYear()===calYear;
                const dow=day?new Date(calYear,calMonth,day).getDay():-1;
                const isPostDay=[1,3,5].includes(dow);
                return <div key={i} style={{minHeight:88,padding:5,background:isPostDay&&day?"rgba(59,130,246,0.03)":"var(--bg)"}}>
                  {day&&<React.Fragment>
                    <span style={{fontSize:11,color:today?"var(--accent)":"var(--muted)",fontWeight:today?700:400,display:"inline-flex",alignItems:"center",justifyContent:"center",width:22,height:22,borderRadius:"50%",background:today?"rgba(59,130,246,0.15)":"transparent"}}>{day}</span>
                    {dp.map(p=><div key={p.id} style={{fontSize:9,padding:"2px 4px",marginTop:2,borderRadius:3,background:p.status==="published"?"rgba(34,197,94,0.12)":"rgba(59,130,246,0.12)",color:p.status==="published"?"var(--green)":"var(--accent)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",cursor:"pointer"}} title={p.caption}>{p.status==="published"?"✓":"○"} {p.caption.substring(0,18)}</div>)}
                  </React.Fragment>}
                </div>
              })}
            </div>
          </div>}

          {/* ─── PUBLISHED ─── */}
          {view==="published"&&<div className="animate-in">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h2 style={{fontSize:22,fontWeight:700,color:"#fff"}}>Published Posts</h2>
              <span style={{fontSize:13,color:"var(--muted)"}}>{published.length} published</span>
            </div>
            {published.length===0?<div style={{...S.card,padding:48,textAlign:"center",color:"var(--muted)"}}><p style={{fontSize:28,marginBottom:8}}>📭</p><p>No published posts yet</p></div>
            :published.slice().reverse().map((p,i)=>
              <div key={p.id} style={{...S.card,marginBottom:8,padding:16,animationDelay:`${i*30}ms`}}>
                <div style={{display:"flex",gap:14}}>
                  {p.imageUrl&&<div style={{width:56,height:56,borderRadius:8,overflow:"hidden",flexShrink:0}}><img src={p.imageUrl} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.parentElement.style.display="none"}} /></div>}
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,lineHeight:1.5,whiteSpace:"pre-wrap",maxHeight:60,overflow:"hidden"}}>{p.caption}</div>
                    <div style={{display:"flex",gap:8,marginTop:8,fontSize:11,color:"var(--muted)",flexWrap:"wrap"}}>
                      <span>📅 {new Date(p.publishedAt).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})}</span>
                      {p.results?.facebook&&<span style={S.badge(p.results.facebook.success,false)}>FB {p.results.facebook.success?"✓ "+p.results.facebook.id?.substring(0,12):"✗ "+p.results.facebook.error?.substring(0,30)}</span>}
                      {p.results?.instagram&&<span style={S.badge(p.results.instagram.success,false)}>IG {p.results.instagram.success?"✓ "+p.results.instagram.id?.substring(0,12):"✗ "+p.results.instagram.error?.substring(0,30)}</span>}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>}

          {/* ─── API HEALTH ─── */}
          {view==="health"&&<div className="animate-in">
            <h2 style={{fontSize:22,fontWeight:700,color:"#fff",marginBottom:20}}>API Health Check</h2>
            {!activeClient?<div style={{...S.card,padding:48,textAlign:"center",color:"var(--muted)"}}><p>Select a client first</p></div>
            :<div style={{...S.card}}>
              <h3 style={{fontSize:16,fontWeight:700,color:"#fff",marginBottom:16}}>{activeClient.name}</h3>
              <ApiHealth client={activeClient} />
              <div style={{borderTop:"1px solid var(--border)",marginTop:16,paddingTop:16}}>
                <div style={S.label}>Connect / Reconnect Facebook</div>
                <p style={{fontSize:12,color:"var(--muted)",marginBottom:10}}>Click below to connect your Facebook Pages. This will generate a permanent Page Access Token and auto-link it to matching clients.</p>
                <a href="/api/meta-auth" style={{display:"inline-flex",alignItems:"center",gap:8,padding:"12px 20px",background:"#1877F2",color:"#fff",borderRadius:8,textDecoration:"none",fontWeight:700,fontSize:14,fontFamily:"inherit"}}>📘 Connect Facebook Pages</a>
              </div>
              <div style={{borderTop:"1px solid var(--border)",marginTop:16,paddingTop:16}}>
                <div style={S.label}>Quick Links</div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  <a href="https://developers.facebook.com/tools/explorer/" target="_blank" style={{fontSize:12,color:"var(--accent)",textDecoration:"none"}}>→ Graph API Explorer (manual tokens)</a>
                  <a href="https://developers.facebook.com/tools/debug/accesstoken/" target="_blank" style={{fontSize:12,color:"var(--accent)",textDecoration:"none"}}>→ Access Token Debugger</a>
                  <a href="https://business.facebook.com/latest/settings/" target="_blank" style={{fontSize:12,color:"var(--accent)",textDecoration:"none"}}>→ Meta Business Settings</a>
                </div>
              </div>
              <div style={{borderTop:"1px solid var(--border)",marginTop:16,paddingTop:16}}>
                <div style={S.label}>Post Statistics</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                  <div style={{textAlign:"center",padding:12,background:"var(--surface2)",borderRadius:8}}>
                    <div style={{fontSize:24,fontWeight:700,color:"var(--accent)"}}>{queued.length}</div>
                    <div style={{fontSize:11,color:"var(--muted)"}}>Queued</div>
                  </div>
                  <div style={{textAlign:"center",padding:12,background:"var(--surface2)",borderRadius:8}}>
                    <div style={{fontSize:24,fontWeight:700,color:"var(--green)"}}>{published.length}</div>
                    <div style={{fontSize:11,color:"var(--muted)"}}>Published</div>
                  </div>
                  <div style={{textAlign:"center",padding:12,background:"var(--surface2)",borderRadius:8}}>
                    <div style={{fontSize:24,fontWeight:700,color:"#fff"}}>{posts.length}</div>
                    <div style={{fontSize:11,color:"var(--muted)"}}>Total</div>
                  </div>
                </div>
              </div>
            </div>}
          </div>}

          {/* ─── CLIENTS & API ─── */}
          {view==="clients"&&<div className="animate-in">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h2 style={{fontSize:22,fontWeight:700,color:"#fff"}}>Clients & API Settings</h2>
              <button onClick={()=>{setEditClient(null);setShowModal(true)}} style={S.btn(true)}>+ Add Client</button>
            </div>
            {clients.length===0?<div style={{...S.card,padding:48,textAlign:"center",color:"var(--muted)"}}><p style={{fontSize:28,marginBottom:8}}>👥</p><p>No clients yet</p></div>
            :clients.map((c,i)=>
              <div key={c.id} style={{...S.card,marginBottom:10,animationDelay:`${i*60}ms`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <h3 style={{fontSize:16,fontWeight:700,color:"#fff",marginBottom:8}}>{c.name}</h3>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      <span style={S.badge(!!c.pageAccessToken,false)}>{c.pageAccessToken?"✓ API Token":"✗ No Token"}</span>
                      <span style={S.badge(!!c.fbPageId,!c.fbPageId)}>{c.fbPageId?"✓ Facebook ("+c.fbPageId+")":"○ Facebook"}</span>
                      <span style={S.badge(!!c.igUserId,!c.igUserId)}>{c.igUserId?"✓ Instagram ("+c.igUserId+")":"○ Instagram"}</span>
                    </div>
                    <div style={{fontSize:11,color:"var(--muted)",marginTop:6}}>Added {new Date(c.createdAt).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}</div>
                    {!c.pageAccessToken&&c.fbPageId&&<a href="/api/meta-auth" style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:8,padding:"6px 14px",background:"#1877F2",color:"#fff",borderRadius:6,textDecoration:"none",fontWeight:600,fontSize:12,fontFamily:"inherit"}}>📘 Connect Facebook</a>}
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>{setEditClient(c);setShowModal(true)}} style={S.btn(false)}>Edit</button>
                    <button onClick={()=>deleteClient(c.id)} style={{...S.btn(false),color:"var(--red)",borderColor:"rgba(239,68,68,0.3)"}}>Delete</button>
                  </div>
                </div>
              </div>
            )}
          </div>}
        </div>
      </div>

      {/* CLIENT MODAL */}
      {showModal&&<ClientModal client={editClient} onSave={saveClient} onClose={()=>{setShowModal(false);setEditClient(null)}} S={S} />}

      {/* BULK IMPORT MODAL */}
      {showBulk&&<BulkImportModal onImport={bulkImport} onClose={()=>setShowBulk(false)} S={S} />}

      {/* TOAST */}
      {toast&&<div style={{position:"fixed",bottom:24,right:24,padding:"12px 20px",borderRadius:10,background:toast.err?"var(--red)":"var(--green)",color:"#fff",fontSize:14,fontWeight:600,zIndex:999,animation:"slideIn .3s ease both",boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}}>{toast.msg}</div>}
    </div>
  );
}

function ClientModal({client,onSave,onClose,S}){
  const [f,setF]=useState({name:client?.name||"",fbPageId:client?.fbPageId||"",igUserId:client?.igUserId||"",pageAccessToken:client?.pageAccessToken||""});
  const [showToken,setShowToken]=useState(false);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={onClose}>
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:16,padding:28,width:520,maxHeight:"80vh",overflow:"auto",animation:"fadeIn .2s ease both"}} onClick={e=>e.stopPropagation()}>
        <h3 style={{fontSize:18,fontWeight:700,color:"#fff",marginBottom:20}}>{client?"Edit Client":"Add New Client"}</h3>
        {[{k:"name",l:"Business Name",p:"e.g. Sorn Handyman Services",t:"text"},
          {k:"fbPageId",l:"Facebook Page ID",p:"Numeric ID from Meta (e.g. 61573109830217)",t:"text"},
          {k:"igUserId",l:"Instagram Business Account ID",p:"From Graph API — /PAGE_ID?fields=instagram_business_account",t:"text"},
        ].map(x=>
          <div key={x.k} style={{marginBottom:14}}>
            <div style={S.label}>{x.l}</div>
            <input type={x.t} value={f[x.k]} onChange={e=>setF(v=>({...v,[x.k]:e.target.value}))} placeholder={x.p} style={S.input} />
          </div>
        )}
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={S.label}>Page Access Token</div>
            <button onClick={()=>setShowToken(!showToken)} style={{fontSize:10,color:"var(--accent)",background:"none",border:"none",cursor:"pointer"}}>{showToken?"Hide":"Show"}</button>
          </div>
          <input type={showToken?"text":"password"} value={f.pageAccessToken} onChange={e=>setF(v=>({...v,pageAccessToken:e.target.value}))} placeholder="Long-lived Page Access Token from Meta" style={S.input} />
          {f.pageAccessToken&&<div style={{fontSize:10,color:"var(--muted)",marginTop:4}}>{f.pageAccessToken.substring(0,20)}...{f.pageAccessToken.substring(f.pageAccessToken.length-10)}</div>}
        </div>
        <div style={{display:"flex",gap:8,marginTop:20,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={S.btn(false)}>Cancel</button>
          <button onClick={()=>onSave(f)} style={S.btn(true)}>{client?"Save Changes":"Add Client"}</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
