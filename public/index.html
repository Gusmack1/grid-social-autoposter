function getHashtags(cap,name){const t=(cap+" "+name).toLowerCase();const tags=new Set();
  if(/repair|fix|mend/.test(t)){tags.add("#HomeRepairs");tags.add("#HandymanLife")}
  if(/deck|garden|planter|outdoor|fence/.test(t)){tags.add("#GardenDesign");tags.add("#OutdoorLiving")}
  if(/bath|kitchen|plumb|tile|reseal/.test(t)){tags.add("#BathroomReno");tags.add("#HomeImprovement")}
  if(/roof|verge|gutter/.test(t)){tags.add("#RoofRepairs");tags.add("#PropertyCare")}
  if(/paint|decor/.test(t)){tags.add("#Painting");tags.add("#InteriorDesign")}
  if(/food|recipe|cook|eat|restaurant/.test(t)){tags.add("#Foodie");tags.add("#InstaFood")}
  if(/scotland|ayrshire|kilmarnock|glasgow/.test(t)){tags.add("#Scotland");tags.add("#Ayrshire")}
  tags.add("#SmallBusiness");tags.add("#SupportLocal");
  return [...tags].filter(tag=>!cap.includes(tag)).slice(0,6)}

function App(){
  const [token,setToken]=useState(localStorage.getItem("gs_token")||"");
  const [user,setUser]=useState(null);const [authed,setAuthed]=useState(false);
  const [authView,setAuthView]=useState("login");const [authErr,setAuthErr]=useState("");const [authMsg,setAuthMsg]=useState("");const [authLoad,setAuthLoad]=useState(false);
  const [lf,setLf]=useState({email:"",password:""});const [rf,setRf]=useState({name:"",email:"",password:"",confirm:""});const [ff,setFf]=useState({email:""});
  const [clients,setCl]=useState([]);const [ac,setAc]=useState(null);const [posts,setPs]=useState([]);
  const [view,setView]=useState("compose");const [admin,setAdmin]=useState(false);
  const [cm,setCm]=useState(new Date().getMonth());const [cy,setCy]=useState(new Date().getFullYear());
  const [toast,setToast]=useState(null);const [showCM,setSCM]=useState(false);const [showBulk,setSB]=useState(false);
  const [ec,setEc]=useState(null);const [ep,setEp]=useState(null);const [showAI,setSAI]=useState(false);const [sbOpen,setSbO]=useState(false);
  const [comp,setComp]=useState({caption:"",imageUrl:"",fb:true,ig:false,tw:false,tt:false,li:false,gb:false,scheduledFor:""});
  const [dragO,setDragO]=useState(false);const fRef=useRef(null);const [pp,setPP]=useState("facebook");const [pub,setPub]=useState(null);
  const [delModal,setDelModal]=useState(null);
  const [teamUsers,setTeamUsers]=useState([]);const [editUser,setEditUser]=useState(null);

  const isAdmin=user?.role==="admin";
  const canWrite=(cid)=>isAdmin||!cid||(user?.assignedClients||[]).includes(cid);
  const st=(m,e)=>{setToast({m,e});setTimeout(()=>setToast(null),3500)};

  const authApi=async(action,body)=>{
    const r=await fetch("/api/auth?action="+action,{method:"POST",headers:{"Content-Type":"application/json",...(token?{Authorization:"Bearer "+token}:{})},body:JSON.stringify(body)});
    return r.json();
  };

  const api=useCallback(async(a,method,body,cid)=>{
    let u="/api/admin?action="+a;if(cid)u+="&clientId="+cid;
    const o={method:method||"GET",headers:{Authorization:"Bearer "+token}};
    if(body){o.headers["Content-Type"]="application/json";o.body=JSON.stringify(body)}
    try{const r=await fetch(u,o);if(r.status===401){setAuthed(false);setUser(null);setToken("");localStorage.removeItem("gs_token");return null}
      if(r.status===403){const d=await r.json();st(d.error||"Permission denied",true);return null}
      return await r.json()}catch(e){st(e.message,true);return null}
  },[token]);

  // Auth: verify stored token on load
  useEffect(()=>{if(!token)return;
    fetch("/api/auth?action=verify",{headers:{Authorization:"Bearer "+token}})
      .then(r=>r.json()).then(d=>{if(d.valid){setUser(d.user);setAuthed(true)}else{localStorage.removeItem("gs_token");setToken("")}})
      .catch(()=>{})

  const doLogin=async()=>{if(!lf.email||!lf.password)return;setAuthLoad(true);setAuthErr("");
    const d=await authApi("login",lf);setAuthLoad(false);
    if(d.success){setToken(d.token);localStorage.setItem("gs_token",d.token);setUser(d.user);setAuthed(true);setAuthErr("")}
    else setAuthErr(d.error||"Login failed")};

  const doRegister=async()=>{if(!rf.name||!rf.email||!rf.password)return setAuthErr("All fields required");
    if(rf.password!==rf.confirm)return setAuthErr("Passwords don't match");
    if(rf.password.length<6)return setAuthErr("Password must be at least 6 characters");
    setAuthLoad(true);setAuthErr("");
    const d=await authApi("register",{name:rf.name,email:rf.email,password:rf.password});setAuthLoad(false);
    if(d.success){setAuthMsg(d.message);setAuthView("login");setAuthErr("")}else setAuthErr(d.error||"Registration failed")};

  const doForgot=async()=>{if(!ff.email)return;setAuthLoad(true);setAuthErr("");

    if(d.success){setAuthMsg(d.message);setAuthView("login")}else setAuthErr(d.error||"Failed")};

  const compressImg=(file,mW=1200,q=0.75)=>new Promise((res,rej)=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>mW){h=Math.round(h*(mW/w));w=mW}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);c.toBlob(b=>{if(b){const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.readAsDataURL(b)}else rej(new Error("fail"))},"image/jpeg",q)};img.onerror=()=>rej(new Error("fail"));img.src=URL.createObjectURL(file)});
  const handleImg=async(file)=>{if(!file?.type.startsWith("image/"))return st("Not an image",true);if(file.size>15*1024*1024)return st("Max 15MB",true);

    const url=e.dataTransfer.getData("text/uri-list")||e.dataTransfer.getData("text/plain")||"";if(url&&/^https?:\/\//.test(url)){setComp(p=>({...p,imageUrl:url}));st("URL added!");return}

  const getPl=()=>{const p=[];if(comp.fb)p.push("facebook");if(comp.ig)p.push("instagram");if(comp.tw)p.push("twitter");if(comp.tt)p.push("tiktok");if(comp.li)p.push("linkedin");if(comp.gb)p.push("google_business");return p};

  const addPost=async()=>{if(!canWrite(ac?.id))return st("You don't have permission for this client",true);if(!comp.caption.trim())return st("Write a caption first!",true);const pl=getPl();if(!pl.length)return st("Pick a platform",true);

function ApiHealth({client:c}){
  const [h,setH]=useState(null);const [ck,setCk]=useState(false);
  const chk=async()=>{if(!c?.pageAccessToken)return setH({s:"no"});setCk(true);
    try{const r=await fetch(`https://graph.facebook.com/v21.0/me?access_token=${c.pageAccessToken}`);const d=await r.json();
      if(d.error)setH({s:"err",m:d.error.message});else{const i={s:"ok",name:d.name};
        try{const dr=await fetch(`https://graph.facebook.com/v21.0/debug_token?input_token=${c.pageAccessToken}&access_token=${c.pageAccessToken}`);const dd=await dr.json();if(dd.data){i.exp=dd.data.expires_at?new Date(dd.data.expires_at*1000).toLocaleDateString("en-GB"):null;i.sc=dd.data.scopes||[]}}catch(e){}setH(i)}}catch(e){setH({s:"err",m:e.message})}setCk(false)};
  useEffect(()=>{if(c)chk()},[c?.id,c?.pageAccessToken]);
  if(!h)return <div className="shimmer" style={{height:60,borderRadius:8}} />;
  const items=[];
  if(h.s==="no")items.push({l:"Token",ok:false,t:"Not set"});else if(h.s==="err")items.push({l:"Token",ok:false,t:h.m?.substring(0,50)});
  else{items.push({l:"Token",ok:true,t:h.name||"Valid"});items.push({l:"Facebook",ok:!!c.fbPageId,t:c.fbPageId?"Connected":"No"});items.push({l:"Instagram",ok:!!c.igUserId,t:c.igUserId?"Connected":"No"});items.push({l:"Expires",ok:true,t:!h.exp||h.exp==="Invalid Date"?"Never":""+h.exp})}
  return <div style={{display:"flex",flexDirection:"column",gap:6}}>{items.map((it,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0"}}><span style={{fontSize:12,color:"var(--mu)"}}>{it.l}</span><span style={S.badge(it.ok)}>{it.t}</span></div>)}
    <button onClick={chk} disabled={ck} style={{marginTop:6,padding:"8px 14px",background:"var(--s2)",border:"1px solid var(--b1)",borderRadius:8,color:"var(--mu)",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{ck?"Checking...":"Check Again"}</button></div>;
}

function EditPostModal({post,onSave,onClose}){
  const [c,setC]=useState(post.caption||"");const [img,setImg]=useState(post.imageUrl||"");const [pl,setPl]=useState(post.platforms||[]);const [sf,setSf]=useState(post.scheduledFor||"");
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}} onClick={onClose}>
    <div style={{background:"var(--s1)",border:"1px solid var(--b1)",borderRadius:16,padding:24,width:520,maxWidth:"100%",maxHeight:"85vh",overflow:"auto",animation:"pop .2s ease"}} onClick={e=>e.stopPropagation()}>
      <h3 style={{fontSize:18,fontWeight:700,color:"#fff",marginBottom:16}}>Edit Post</h3>
      <textarea value={c} onChange={e=>setC(e.target.value)} style={{...S.inp,minHeight:140,resize:"vertical",lineHeight:1.6,marginBottom:12}} />
      <div style={S.lbl}>Image URL</div><input value={img} onChange={e=>setImg(e.target.value)} style={{...S.inp,marginBottom:12}} />
      <div style={S.lbl}>Schedule (GMT)</div><input type="datetime-local" value={sf} onChange={e=>setSf(e.target.value)} style={{...S.inp,colorScheme:"dark",marginBottom:16}} />
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button onClick={onClose} style={S.btn(false)}>Cancel</button><button onClick={()=>onSave({...post,caption:c,imageUrl:img,platforms:pl,scheduledFor:sf,status:sf?"scheduled":"queued"})} style={S.btn(true)}>Save</button></div>
    </div>
  </div>;
}

function AICaptionGen({client,onInsert,onClose}){
  const [pr,setPr]=useState("");const [ld,setLd]=useState(false);const [res,setRes]=useState("");const [tone,setTone]=useState("friendly");
  const gen=async()=>{if(!pr.trim())return;setLd(true);setRes("");
    try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:`Write social media posts for "${client?.name||"a business"}". Tone: ${tone}. Include emojis and hashtags. Max 200 words. Output ONLY the post. Use British English spelling.`,
        messages:[{role:"user",content:`Write a post about: ${pr}`}]})});
      const d=await r.json();setRes(d.content?.map(c=>c.text||"").join("")||"Error")}catch(e){setRes("Error: "+e.message)}setLd(false)};
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}} onClick={onClose}>
    <div style={{background:"var(--s1)",border:"1px solid var(--b1)",borderRadius:16,padding:24,width:520,maxWidth:"100%",animation:"pop .2s ease"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><span style={{fontSize:17,fontWeight:700,color:"#fff"}}>AI Writer</span><button onClick={onClose} style={{background:"none",border:"none",color:"var(--mu)",cursor:"pointer",fontSize:18}}>{"\u2715"}</button></div>
      <div style={{display:"flex",gap:5,marginBottom:12,flexWrap:"wrap"}}>{["friendly","professional","funny","urgent","inspirational"].map(t=>
        <button key={t} onClick={()=>setTone(t)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${tone===t?"var(--ac)":"var(--b1)"}`,background:tone===t?"var(--acbg)":"transparent",color:tone===t?"var(--ac2)":"var(--mu)",fontSize:11,cursor:"pointer",fontFamily:"inherit",textTransform:"capitalize"}}>{t}</button>)}</div>
      <div style={{display:"flex",gap:8}}><input value={pr} onChange={e=>setPr(e.target.value)} onKeyDown={e=>e.key==="Enter"&&gen()} placeholder="What's the post about?" style={{...S.inp,flex:1}} />
        <button onClick={gen} disabled={ld} style={{...S.btn(true),opacity:ld?.6:1}}>{ld?"...":"Generate"}</button></div>
      {res&&<div style={{marginTop:14,padding:14,background:"var(--s2)",borderRadius:12,border:"1px solid var(--b1)"}}>
        <div style={{fontSize:14,lineHeight:1.7,whiteSpace:"pre-wrap",maxHeight:200,overflow:"auto",marginBottom:10}}>{res}</div>
        <div style={{display:"flex",gap:6}}><button onClick={()=>{onInsert(res);onClose()}} style={{...S.btn(true,"sm"),background:"var(--gn)"}}>Use This</button><button onClick={gen} style={S.btn(false,"sm")}>Rewrite</button></div>
      </div>}
    </div>
  </div>;
}

function BulkImportModal({onImport,onClose}){
  const [raw,setRaw]=useState("");const [parsed,setParsed]=useState([]);
  const parse=()=>{const chunks=raw.split("---").map(c=>c.trim()).filter(Boolean);setParsed(chunks.map(c=>{const m=c.match(/https?:\/\/\S+\.(jpg|jpeg|png|gif|webp)\S*/i);return{caption:m?c.replace(m[0],"").trim():c,imageUrl:m?m[0]:""}}))}
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}} onClick={onClose}>
    <div style={{background:"var(--s1)",border:"1px solid var(--b1)",borderRadius:16,padding:24,width:540,maxWidth:"100%",maxHeight:"85vh",overflow:"auto",animation:"pop .2s ease"}} onClick={e=>e.stopPropagation()}>
      <h3 style={{fontSize:18,fontWeight:700,color:"#fff",marginBottom:12}}>Bulk Import</h3>
      <p style={{fontSize:12,color:"var(--mu)",marginBottom:12}}>Separate posts with ---</p>
      <textarea value={raw} onChange={e=>setRaw(e.target.value)} placeholder={"First post\n---\nSecond post"} style={{...S.inp,minHeight:160,resize:"vertical",fontSize:13,lineHeight:1.6,marginBottom:8}} />
      <button onClick={parse} style={{...S.btn(false),marginBottom:10}}>Preview ({raw.split("---").filter(c=>c.trim()).length})</button>
      {parsed.length>0&&<div><button onClick={()=>{onImport(parsed);onClose()}} style={{...S.btn(true),width:"100%"}}>Import {parsed.length}</button></div>}
    </div>
  </div>;
}

function ClientModal({client,onSave,onClose}){
  const [f,setF]=useState({name:client?.name||"",fbPageId:client?.fbPageId||"",igUserId:client?.igUserId||"",pageAccessToken:client?.pageAccessToken||"",twitterApiKey:client?.twitterApiKey||"",twitterApiSecret:client?.twitterApiSecret||"",twitterAccessToken:client?.twitterAccessToken||"",twitterAccessSecret:client?.twitterAccessSecret||"",tiktokAccessToken:client?.tiktokAccessToken||"",linkedinId:client?.linkedinId||"",linkedinAccessToken:client?.linkedinAccessToken||"",gbpId:client?.gbpId||"",gbpAccessToken:client?.gbpAccessToken||""});
  const [ss,setSs]=useState(null);
  const lnk=(url,text)=><a href={url} target="_blank" rel="noopener noreferrer" style={{fontSize:9,color:"var(--ac2)",textDecoration:"none",marginLeft:4,opacity:.8}}>({text})</a>;
  const secs=[{id:"meta",l:"Facebook & Instagram",icon:"facebook",fs:[
      {k:"fbPageId",l:"Page ID",help:lnk("https://www.facebook.com/pages/?category=your_pages","Find your page")},
      {k:"igUserId",l:"Instagram Business ID",help:lnk("https://developers.facebook.com/tools/explorer/?method=GET&path=me%2Faccounts%3Ffields%3Dinstagram_business_account","Find IG ID")},
      {k:"pageAccessToken",l:"Page Access Token",help:lnk("https://developers.facebook.com/tools/debug/accesstoken/","Extend token")}
    ],h:<a href="/api/meta-auth" style={{display:"inline-flex",padding:"7px 14px",background:"#1877F2",color:"#fff",borderRadius:8,textDecoration:"none",fontWeight:600,fontSize:12,marginBottom:8,alignItems:"center",gap:6}}><PIcon p="facebook" size={14}/>Connect Facebook</a>},
    {id:"tw",l:"X / Twitter",icon:"twitter",fs:[{k:"twitterApiKey",l:"API Key",help:lnk("https://developer.x.com/en/portal/dashboard","X Developer Portal")},{k:"twitterApiSecret",l:"API Secret"},{k:"twitterAccessToken",l:"Access Token"},{k:"twitterAccessSecret",l:"Access Secret"}]},
    {id:"li",l:"LinkedIn",icon:"linkedin",fs:[{k:"linkedinId",l:"Page ID",help:lnk("https://www.linkedin.com/company/","Find page")},{k:"linkedinAccessToken",l:"Token",help:lnk("https://www.linkedin.com/developers/apps","LinkedIn Developers")}]},
    {id:"tt",l:"TikTok",icon:"tiktok",fs:[{k:"tiktokAccessToken",l:"Access Token",help:lnk("https://developers.tiktok.com/","TikTok Developers")}]},
    {id:"gbp",l:"Google Business",icon:"google_business",fs:[{k:"gbpId",l:"Location ID",help:lnk("https://business.google.com/","Google Business Profile")},{k:"gbpAccessToken",l:"Token"}]}];
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}} onClick={onClose}>
    <div style={{background:"var(--s1)",border:"1px solid var(--b1)",borderRadius:16,padding:24,width:520,maxWidth:"100%",maxHeight:"90vh",overflow:"auto",animation:"pop .2s ease"}} onClick={e=>e.stopPropagation()}>
      <h3 style={{fontSize:18,fontWeight:700,color:"#fff",marginBottom:16}}>{client?"Edit":"Add"} Client</h3>
      <div style={{marginBottom:14}}><div style={S.lbl}>Business Name</div><input value={f.name} onChange={e=>setF(v=>({...v,name:e.target.value}))} style={S.inp} /></div>
      {secs.map(sec=>{const open=ss===sec.id;return <div key={sec.id} style={{marginBottom:5,borderRadius:10,border:"1px solid var(--b1)",overflow:"hidden",background:"var(--s2)"}}>
        <button onClick={()=>setSs(s=>s===sec.id?null:sec.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:"transparent",border:"none",cursor:"pointer",fontFamily:"inherit",color:"#fff",fontSize:12,fontWeight:600}}>
          <PIcon p={sec.icon} size={14}/>{sec.l}<span style={{marginLeft:"auto",fontSize:10,color:"var(--mu)",transform:open?"rotate(180deg)":"none",transition:"transform .2s"}}>{"\u25BC"}</span>
        </button>
        {open&&<div style={{padding:"0 12px 12px",borderTop:"1px solid var(--b1)",paddingTop:10}}>
          {sec.h}{sec.fs.map(fi=><div key={fi.k} style={{marginBottom:6}}>
            <div style={{display:"flex",alignItems:"center",fontSize:9,fontWeight:600,color:"var(--mu)",marginBottom:2}}>
              {fi.l}{fi.help||null}
            </div>
            <input value={f[fi.k]||""} onChange={e=>setF(v=>({...v,[fi.k]:e.target.value}))} style={{...S.inp,fontSize:12,padding:"7px 10px"}} placeholder={fi.l} />
          </div>)}
        </div>}
      </div>})}
      <div style={{display:"flex",gap:8,marginTop:16,justifyContent:"flex-end"}}><button onClick={onClose} style={S.btn(false)}>Cancel</button><button onClick={()=>onSave(f)} style={S.btn(true)}>{client?"Save":"Add"}</button></div>
    </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
